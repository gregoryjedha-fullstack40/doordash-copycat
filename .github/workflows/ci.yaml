name: CI Workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        
      - name: Build docker image
        run: docker build -t doordash/delivery-fee-service .

      - name: Build docker image
        run: docker run -d -p 8090:8090 --name delivery-fee-service doordash/delivery-fee-service

      - name: Show container logs
        run: docker logs delivery-fee-service

      - name: Test endpoint calculate-fee
        run: |
          curl -sSf -X POST http://localhost:8090/calculate-fee/ \
            -H "Content-Type: application/json" \
            -d '{"distance_km": 10.5, "weight_kg": 2.0}' || exit 1
      
      - name: Test endpoint estimate-time
        run: curl -sSf -X POST http://localhost:8090/estimate-time || exit 1

      - name: Test endpoint status
        run: curl -sSf -X GET http://localhost:8090/status || exit 1

      - name: Stop and remove container
        run: docker stop delivery-fee-service && docker rm delivery-fee-service

